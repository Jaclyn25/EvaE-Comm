<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Shipped - E-Commerce</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="success-page">
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon-wrapper">
                <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 6L9 17l-5-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="success-title">Order Shipped!</h1>
            <p class="success-message">Your order has been successfully placed and will be shipped soon.</p>
            <a href="index.html" class="back-home-btn">
                <span>Back to Home</span>
                <div class="ripple-effect"></div>
            </a>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/buttonTop.js"></script>
</body>
    <!-- Scroll To Top Button -->
    <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top" tabindex="0">
        <span class="scroll-top-icon" aria-hidden="true">
            <i class="fa-solid fa-arrow-up"></i>
        </span>
    </button>
</body>
</html>
